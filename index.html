<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="快速访问各AI平台的余额页面">
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%236366f1' rx='20' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E⚡%3C/text%3E%3C/svg%3E">
    <title>AI平台余额快捷入口</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 页面头部 -->
    <header class="header">
        <h1 class="header-title">AI平台余额快捷入口</h1>
        <div class="header-actions">
            <div class="search-wrapper">
                <label for="searchInput" class="visually-hidden">搜索平台</label>
                <input type="text" class="search-input" placeholder="搜索平台... (Ctrl+K)" id="searchInput" aria-label="搜索平台">
                <button class="search-clear" id="searchClear" aria-label="清空搜索">×</button>
            </div>
            <button class="btn btn-secondary" id="addPlatformBtn" aria-label="添加新平台">+ 添加平台</button>
            <button class="btn btn-secondary" id="selectModeBtn" aria-label="进入选择模式">☑️ 批量选择</button>
            <div class="dropdown">
                <button class="btn btn-icon" id="moreBtn" aria-label="更多操作" aria-haspopup="true" aria-expanded="false">
                    <span aria-hidden="true">⋮</span>
                </button>
                <div class="dropdown-menu" id="moreMenu" role="menu" aria-label="更多操作菜单">
                    <button class="dropdown-item" id="exportBtn" role="menuitem">导出配置</button>
                    <button class="dropdown-item" id="importBtn" role="menuitem">导入配置</button>
                    <button class="dropdown-item" id="resetBtn" role="menuitem">重置配置</button>
                </div>
            </div>
            <button class="btn btn-icon" id="themeToggle" aria-label="切换深色/浅色主题">
                <span class="theme-icon" aria-hidden="true">🌙</span>
            </button>
            <button class="btn btn-icon" id="effectsToggle" aria-label="切换特效模式">
                <span class="effects-icon" aria-hidden="true">⚡</span>
            </button>
        </div>
    </header>

    <!-- 工具栏 -->
    <nav class="toolbar" aria-label="筛选和视图选项">
        <div class="filter-tabs" id="filterTabs" role="tablist" aria-label="平台分类筛选">
            <button class="filter-tab active" data-category="all" role="tab" aria-selected="true">全部</button>
            <!-- 动态生成分类标签 -->
            <div id="categoryTabsContainer"></div>
            <button class="filter-tab" data-category="starred" role="tab" aria-selected="false">已收藏</button>
        </div>
        <div class="view-toggle" role="group" aria-label="视图切换">
            <button class="view-btn active" data-view="grid" title="卡片视图" aria-label="卡片视图" aria-pressed="true">▦</button>
            <button class="view-btn" data-view="list" title="列表视图" aria-label="列表视图" aria-pressed="false">☰</button>
        </div>
    </nav>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="importFile" accept=".json" style="display: none;" aria-hidden="true">

    <!-- 主内容区域 -->
    <main class="main-content" id="mainContent">
        <!-- 平台卡片容器 -->
        <div class="platform-grid" id="platformGrid" role="list" aria-label="AI平台列表">
            <!-- 平台卡片将通过JavaScript动态生成 -->
        </div>

        <!-- 空状态提示 -->
        <div class="empty-state" id="emptyState" style="display: none;" role="status" aria-live="polite">
            <div class="empty-icon" aria-hidden="true">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
            </div>
            <p class="empty-title">暂无平台数据</p>
            <p class="empty-desc">点击下方按钮添加你的第一个AI平台</p>
            <button class="btn btn-primary" id="addFirstPlatformBtn">+ 添加第一个平台</button>
        </div>
    </main>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer" role="alert" aria-live="polite" aria-atomic="true"></div>

    <!-- 批量操作工具栏 -->
    <div class="batch-toolbar" id="batchToolbar" role="toolbar" aria-label="批量操作">
        <div class="batch-toolbar-left">
            <span class="batch-selected-count">已选中 <strong id="selectedCount">0</strong> 个平台</span>
        </div>
        <div class="batch-toolbar-right">
            <button class="btn btn-secondary" id="selectAllBtn" title="全选当前结果">全选</button>
            <button class="btn btn-primary" id="batchOpenBtn" title="批量打开选中的平台">批量打开</button>
            <button class="btn btn-secondary" id="cancelSelectBtn" title="退出选择模式">取消选择</button>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle" aria-describedby="editModalDesc">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="editModalTitle">编辑平台</h2>
                <button class="modal-close" id="modalClose" aria-label="关闭弹窗">&times;</button>
            </div>
            <div class="modal-body" id="editModalDesc">
                <div class="form-group">
                    <label for="editName">平台名称</label>
                    <input type="text" id="editName" class="form-input" placeholder="请输入平台名称" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="editUrl">余额页面链接</label>
                    <input type="url" id="editUrl" class="form-input" placeholder="请输入余额页面链接" autocomplete="url">
                    <p class="form-hint" id="editUrlHint" style="display: none;">默认链接: <span></span></p>
                </div>
                <div class="form-group">
                    <label for="editCategory">分类</label>
                    <select id="editCategory" class="form-select">
                        <!-- 动态生成选项 -->
                    </select>
                </div>
                <div class="form-group form-checkbox">
                    <label class="checkbox-label">
                        <input type="checkbox" id="editStarred">
                        <span class="checkbox-custom"></span>
                        <span>收藏此平台</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalReset" style="display: none;">恢复默认链接</button>
                <button class="btn btn-secondary" id="modalCancel">取消</button>
                <button class="btn btn-danger" id="modalDelete">删除</button>
                <button class="btn btn-primary" id="modalSave">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加平台弹窗 -->
    <div class="modal" id="addModal" role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="addModalTitle">添加平台</h2>
                <button class="modal-close" id="addModalClose" aria-label="关闭弹窗">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="addName">平台名称 <span class="required" aria-hidden="true">*</span></label>
                    <input type="text" id="addName" class="form-input" placeholder="请输入平台名称" autocomplete="off" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="addUrl">余额页面链接 <span class="required" aria-hidden="true">*</span></label>
                    <input type="url" id="addUrl" class="form-input" placeholder="请输入余额页面链接" autocomplete="url" required aria-required="true">
                </div>
                <div class="form-group">
                    <label for="addCategory">分类</label>
                    <select id="addCategory" class="form-select">
                        <!-- 动态生成选项 -->
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="addModalCancel">取消</button>
                <button class="btn btn-primary" id="addModalSave">添加</button>
            </div>
        </div>
    </div>

    <!-- 导入确认弹窗 -->
    <div class="modal" id="importConfirmModal" role="dialog" aria-modal="true" aria-labelledby="importConfirmTitle">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="importConfirmTitle">确认导入配置</h2>
                <button class="modal-close" id="importConfirmClose" aria-label="关闭弹窗">&times;</button>
            </div>
            <div class="modal-body">
                <p class="import-warn">导入将覆盖当前的以下配置：</p>
                <div id="importInfo"></div>
                <p class="import-hint">确定要继续吗？</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="importCancelBtn">取消</button>
                <button class="btn btn-primary" id="importConfirmBtn">确认导入</button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>数据存储在本地浏览器中，清除浏览器数据会导致配置丢失</p>
    </footer>

    <!-- 屏幕阅读器专用隐藏标签 -->
    <span class="visually-hidden" id="screenReaderStatus" aria-live="polite" aria-atomic="true"></span>

    <!-- JavaScript文件引入（按依赖顺序） -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/state.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/validator.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/events.js"></script>
    <script src="js/app.js"></script>

    <!-- Service Worker 注册 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker 注册成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker 注册失败:', error);
                    });
            });
        }
    </script>
</body>
</html>
