<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="快速访问各AI平台的余额页面">
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <title>AI平台余额快捷入口</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 页面头部 -->
    <header class="header">
        <h1 class="header-title">AI平台余额快捷入口</h1>
        <div class="header-actions">
            <div class="search-wrapper">
                <input type="text" class="search-input" placeholder="搜索平台... (Ctrl+K)" id="searchInput">
                <button class="search-clear" id="searchClear" title="清空搜索">×</button>
            </div>
            <button class="btn btn-secondary" id="addPlatformBtn">+ 添加平台</button>
            <div class="dropdown">
                <button class="btn btn-icon" id="moreBtn" title="更多操作">
                    <span>⋮</span>
                </button>
                <div class="dropdown-menu" id="moreMenu">
                    <button class="dropdown-item" id="exportBtn">📤 导出配置</button>
                    <button class="dropdown-item" id="importBtn">📥 导入配置</button>
                    <button class="dropdown-item" id="resetBtn">🔄 重置配置</button>
                </div>
            </div>
            <button class="btn btn-icon" id="themeToggle" title="切换主题">
                <span class="theme-icon">🌙</span>
            </button>
        </div>
    </header>

    <!-- 工具栏 -->
    <div class="toolbar">
        <div class="filter-tabs" id="filterTabs">
            <button class="filter-tab active" data-category="all">全部</button>
            <button class="filter-tab" data-category="大模型">大模型</button>
            <button class="filter-tab" data-category="图像生成">图像生成</button>
            <button class="filter-tab" data-category="其他">其他</button>
            <button class="filter-tab" data-category="starred">⭐ 已收藏</button>
        </div>
        <div class="view-toggle">
            <button class="view-btn active" data-view="grid" title="卡片视图">▦</button>
            <button class="view-btn" data-view="list" title="列表视图">☰</button>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="importFile" accept=".json" style="display: none;">

    <!-- 主内容区域 -->
    <main class="main-content">
        <!-- 平台卡片容器 -->
        <div class="platform-grid" id="platformGrid">
            <!-- 平台卡片将通过JavaScript动态生成 -->
        </div>

        <!-- 空状态提示 -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">📭</div>
            <p class="empty-title">暂无平台数据</p>
            <p class="empty-desc">点击下方按钮添加你的第一个AI平台</p>
            <button class="btn btn-primary" id="addFirstPlatformBtn">+ 添加第一个平台</button>
        </div>
    </main>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 编辑弹窗 -->
    <div class="modal" id="editModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">编辑平台</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="editName">平台名称</label>
                    <input type="text" id="editName" class="form-input" placeholder="请输入平台名称">
                </div>
                <div class="form-group">
                    <label for="editUrl">余额页面链接</label>
                    <input type="url" id="editUrl" class="form-input" placeholder="请输入余额页面链接">
                    <p class="form-hint" id="editUrlHint" style="display: none;">默认链接: <span></span></p>
                </div>
                <div class="form-group">
                    <label for="editCategory">分类</label>
                    <select id="editCategory" class="form-select">
                        <option value="大模型">大模型</option>
                        <option value="图像生成">图像生成</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group form-checkbox">
                    <label class="checkbox-label">
                        <input type="checkbox" id="editStarred">
                        <span class="checkbox-custom"></span>
                        <span>收藏此平台</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalReset" style="display: none;">恢复默认链接</button>
                <button class="btn btn-secondary" id="modalCancel">取消</button>
                <button class="btn btn-danger" id="modalDelete">删除</button>
                <button class="btn btn-primary" id="modalSave">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加平台弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">添加平台</h2>
                <button class="modal-close" id="addModalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="addName">平台名称 <span class="required">*</span></label>
                    <input type="text" id="addName" class="form-input" placeholder="请输入平台名称">
                </div>
                <div class="form-group">
                    <label for="addUrl">余额页面链接 <span class="required">*</span></label>
                    <input type="url" id="addUrl" class="form-input" placeholder="请输入余额页面链接">
                </div>
                <div class="form-group">
                    <label for="addCategory">分类</label>
                    <select id="addCategory" class="form-select">
                        <option value="大模型">大模型</option>
                        <option value="图像生成">图像生成</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="addModalCancel">取消</button>
                <button class="btn btn-primary" id="addModalSave">添加</button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>数据存储在本地浏览器中，清除浏览器数据会导致配置丢失</p>
    </footer>

    <!-- JavaScript文件引入 -->
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>

    <!-- Service Worker 注册 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker 注册成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker 注册失败:', error);
                    });
            });
        }
    </script>
</body>
</html>
